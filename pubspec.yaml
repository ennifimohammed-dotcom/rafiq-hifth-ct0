name: quran_teacher_tracker
description: "Quran Teacher Tracker - track students' memorization, revision, attendance and notes, with shareable parent reports."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0

  # Navigation
  go_router: ^14.6.2

  # UI / Charts / QR
  fl_chart: ^0.69.0
  qr_flutter: ^4.1.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  share_plus: ^10.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
